version: 1.0

models:
  type: node
  label: customer
  settings:
    contract:
      enforced: true
    on_schema_error: skip_row
  description: >
    Customer Node represents a customer in the system. It contains properties such as name, email, and phone number.

  properties:
    - name: gid
      description: Global Identifier for the customer
      data_type: string
      constraints:
        - IS UNIQUE
    - name: district
      description: District where the customer resides
      data_type: string
    - name: dob
      description: Date of Birth of the customer
      data_type: date
    - name: status
      description: Current status of the customer (e.g., active, inactive)
      data_type: string
    - name: created_date
      description: Timestamp when the customer record was created
      data_type: datetime
    - name: updated_at
      description: Timestamp when the customer record was last updated
      data_type: datetime
    - name: cust_type
      description: Type of customer (e.g., I, G, C)
      data_type: string
